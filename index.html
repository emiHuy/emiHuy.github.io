<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Emily Huynh's Website</title>
        <link rel="stylesheet" href="styles.css"/>
        <script src="data.js" defer></script>
        <script src="window.js" defer></script>
        <script src="main.js" defer></script>
    </head>
    <body>
        <!-- Greeting -->
        <div class="greeting">
            <h1 class="name">Hi! <span class='bold-accented'>I'm Emily.</span></h1>
            <p class="sub">Computer Science Student</p>
        </div>

        <div class="icon-grid">
            <!-- About Icon -->
            <div class="nav-icon" onclick="openWindow('about')">
                <div class="icon-box">
                    <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="rgba(200,190,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                </div>
                <span class="icon-label">About</span>
            </div>

            <!-- Experience Icon -->
            <div class="nav-icon" onclick="openWindow('experience')">
                <div class="icon-box">
                    <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="rgba(150,220,180,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                    </svg>
                </div>
                <span class="icon-label">Experience</span>
            </div>

            <!-- Projects Icon -->
            <div class="nav-icon" onclick="openWindow('projects')">
                <div class="icon-box">
                    <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="rgba(255,200,100,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg>
                </div>
                <span class="icon-label">Projects</span>
            </div>

            <!-- Skills Icon -->
            <div class="nav-icon" onclick="openWindow('skills')">
                <div class="icon-box">
                    <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="rgba(130,180,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </div>
                <span class="icon-label">Skills</span>
            </div>

            <!-- Contact Icon -->
            <div class="nav-icon" onclick="openWindow('contact')">
                <div class="icon-box">
                    <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="rgba(240,130,130,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <span class="icon-label">Contact</span>
            </div>
        </div>

        <!-- Social dock-->
        <div class="social-dock">
            <a class="social-icon" href="https://linkedin.com/in/emily-huynh-tt8" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 48 48">
                    <circle cx="24" cy="24" r="24" fill="var(--accent)"/>
                    <path d="M15 19.5h4V33h-4V19.5zm2-6.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zm6 6.5h3.8v1.85h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V33h-4v-6.35c0-1.51-.03-3.46-2.11-3.46-2.11 0-2.44 1.65-2.44 3.35V33h-4V19.5z"/>
                </svg>
            </a>
            <a class="social-icon" href="https://github.com/emiHuy" target="_blank">
                <svg class="scale-github" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 48 48">
                    <circle cx="24" cy="24" r="24" />
                    <path fill="var(--accent)" d="M24 12C17.37 12 12 17.37 12 24c0 5.31 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.65.24 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.21.7.83.58C32.57 33.8 36 29.31 36 24c0-6.63-5.37-12-12-12z"/>
                </svg>
            </a>
            <a class="social-icon" href="mailto:emilyhuynh06@gmail.com" target="_blank">
                <svg class="scale-mail" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 48 48">
                    <circle cx="24" cy="24" r="24" fill="var(--accent)"/>
                    <rect x="13" y="17" width="22" height="15" rx="2" fill="#13131a"/>
                    <polyline points="13,17 24,26 35,17" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>
                </svg>
            </a>
        </div> 

        <!-- Clock -->
        <div class="clock" id="clock"></div>

        <!-- Window Overlay -->
        <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
            <div class="window" id="window">
                <div class="window-header" id="window-header">
                    <span class="window-title" id="window-title"></span>
                    <button class="window-close" id="btn-close" onclick="closeWindow()">&#x2715;</button>
                </div>
                <div class="window-body" id="window-body"></div>
            </div>
        </div>

    </body>
</html>
